# config/bootstrap.yaml

ransac:
  seed: 0

  F:
    num_trials: 2000
    sample_size: 8
    threshold_px: 8
    min_inliers: 30
    min_inlier_ratio: 0.3
    shrink_guard: 0.8
    recompute_mask: true
    noise_sigma_px: null

  H:
    num_trials: 2000
    normalise: true
    threshold_px: 3
    min_inliers: 20

bootstrap:
  eps: 1e-9

  # "F", "cheirality", or "intersection"
  mask_policy: "F"

  planar:
    gamma: 1.2
    min_H_inliers: 20
    require_H_success: false
    min_F_inliers_for_test: 30

  parallax:
    min_p50_deg: 1.0
    min_p25_deg: 0.7
    min_points: 8
    quartile_trim: [0.1, 0.9]

  depth:
    min_points: 20
    cheirality_min: 0.7
    depth_max_ratio: 100.0
    depth_sanity_min: 0.7
    translation_norm: 1.0
    baseline_override: null

pnp:
  sample_size: 16
  min_inliers: 16
  threshold_px: 8.0
  enable_pnp_threshold_stability_diagnostic: false
  enable_pnp_threshold_stability_gate: false
  pnp_threshold_stability_compare_px: 12.0
  pnp_threshold_stability_min_support_iou: 0.25
  pnp_threshold_stability_max_translation_direction_deg: 120.0
  pnp_threshold_stability_max_camera_centre_direction_deg: 120.0
  pnp_threshold_stability_disjoint_iou: 0.05
